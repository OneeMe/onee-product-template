name: Model Eval

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    environment: model-eval
    name: Model Eval
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Install dependencies
        run: npm install

      - name: Run model evaluations
        run: npm run eval

      - name: Upload model-eval evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: model-eval-evidence
          path: .cache/test-results/eval/
          if-no-files-found: ignore
          retention-days: 7
